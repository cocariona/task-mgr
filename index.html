<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Manager - GTD 과제관리</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script><!-- @7 고정(2026-06-17): 비고정 CDN이 v8로 자동승급 → v8 React preset이 automatic JSX runtime(import 방출)이라 UMD(비-module) 스크립트서 전체 백지. v7=classic(React.createElement)로 정상. -->

  <!-- Firebase (Auth 로그인). compat 빌드 = 빌드툴 없이 전역 firebase 사용.
       파일 저장은 Storage 대신 RTDB(/files, base64) — Storage는 신규 프로젝트에서 유료플랜 필수라 미사용 -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f9fafb; -webkit-text-size-adjust: 100%; }
    /* 모바일 터치 최적화 */
    button, select, input { touch-action: manipulation; }
    input[type="date"] { min-height: 36px; }
    /* 드래그 삽입선 애니메이션 */
    @keyframes dropPulse { 0%,100% { opacity: 0.7; } 50% { opacity: 1; } }
    .drop-indicator-before { border-top: 3px solid #3B82F6 !important; }
    .drop-indicator-after { border-bottom: 3px solid #3B82F6 !important; }
    /* 모바일 반응형 */
    @media (max-width: 640px) {
      body { font-size: 14px; }
      .app-wrap { padding: 0 8px 80px !important; }
      .tab-bar { overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; gap: 2px !important; }
      .tab-bar::-webkit-scrollbar { display: none; }
      .tab-bar button { white-space: nowrap; padding: 8px 10px !important; font-size: 12px !important; min-height: 40px; }
      .form-row { flex-direction: column !important; gap: 8px !important; }
      .form-row input, .form-row select, .form-row button { width: 100% !important; min-height: 40px; flex: none !important; box-sizing: border-box !important; }
      .form-row > div { width: 100% !important; flex-direction: column !important; }
      .form-row > div > * { width: 100% !important; flex: none !important; box-sizing: border-box !important; }
      .form-row .star-btn { width: 40px !important; }
      .task-row { padding: 10px 8px !important; }
      .task-row .grip { display: none; }
      .hdr-wrap { flex-direction: column; gap: 8px; align-items: flex-start !important; }
      .plan-fields { flex-direction: column !important; }
      .plan-fields > * { width: 100% !important; flex: none !important; box-sizing: border-box !important; }
      .modal-content { width: 95% !important; max-width: none !important; padding: 16px !important; margin: 8px !important; }
      .modal-content input, .modal-content select, .modal-content textarea { width: 100% !important; box-sizing: border-box !important; }
      .modal-content .plan-fields > * { width: 100% !important; }
      .modal-row { flex-direction: column !important; gap: 8px !important; }
      .modal-row > div { width: 100% !important; }
    }
    @media (hover: none) and (pointer: coarse) {
      .task-actions { display: flex !important; opacity: 0.6; }
      .task-actions:active { opacity: 1; }
      button, select { min-height: 36px; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
const { useState, useMemo, useRef, useEffect } = React;

/* ─── 상수 ─── */
const STATUSES = {
  action: { label: "다음행동", color: "#3B82F6", bg: "#EFF6FF", icon: "🔵" },
  waiting: { label: "대기중", color: "#F59E0B", bg: "#FFFBEB", icon: "⏳" },
  someday: { label: "나중에", color: "#9CA3AF", bg: "#F9FAFB", icon: "💤" },
  done: { label: "완료", color: "#10B981", bg: "#ECFDF5", icon: "✅" },
};
const SK = Object.keys(STATUSES).filter(k => k !== "done");
/* 업무 채널 마커 (S3) — 🧠 지식 / 🎯 예측 / ✍️ 외화 */
const MARKERS = [["지식", "🧠"], ["예측", "🎯"], ["외화", "✍️"]];

const TABS_BY_WS = {
  work: [
    { id: "today", label: "오늘", icon: "⭐" },
    { id: "projects", label: "과제별", icon: "📁" },
    { id: "memos", label: "과제 맥락", icon: "📝" },
    { id: "history", label: "히스토리", icon: "📜" },
  ],
  personal: [
    { id: "today", label: "오늘", icon: "⭐" },
    { id: "projects", label: "유형별", icon: "📁" },
    { id: "channels", label: "회고", icon: "🔎" },
    { id: "history", label: "히스토리", icon: "📜" },
  ],
};

/* 로컬 시간 기준 오늘 날짜 (UTC가 아닌 KST 등 현지 시간) */
let TODAY = (() => { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; })();
/* 자정 경과 시 자동 갱신 (60초마다 체크) */
setInterval(() => { const d = new Date(); const now = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; if (now !== TODAY) { TODAY = now; window.location.reload(); } }, 60000);
const gid = () => Math.random().toString(36).slice(2, 9);
const fd = (d) => { const t = new Date(d); return `${t.getFullYear()}.${String(t.getMonth()+1).padStart(2,"0")}.${String(t.getDate()).padStart(2,"0")}`; };
const diffDays = (dateStr) => {
  if (!dateStr) return null;
  const target = new Date(dateStr + "T00:00:00");
  const today = new Date(TODAY + "T00:00:00");
  return Math.round((target - today) / 86400000);
};
const deadlineInfo = (dateStr) => {
  const d = diffDays(dateStr);
  if (d === null) return null;
  if (d < 0) return { label: `${-d}일 초과`, color: "#DC2626", bg: "#FEF2F2", icon: "🔴" };
  if (d === 0) return { label: "오늘 마감", color: "#EA580C", bg: "#FFF7ED", icon: "🟠" };
  if (d <= 7) return { label: `D-${d}`, color: "#D97706", bg: "#FFFBEB", icon: "🟡" };
  return { label: `D-${d}`, color: "#6B7280", bg: "#F3F4F6", icon: "" };
};

/* ─── Google Apps Script (캘린더 전용) ─── */
const GAS_URL = "https://script.google.com/macros/s/AKfycby1EJPrhqE7wOQQXd-vjwSIuyRwiAoq0Jc8gsELPq-5uWa8cIweFmfdKP1GmGTnWDAawg/exec";

/* ─── Firebase (Auth 로그인 + Realtime DB 동기화 + Storage 파일) ─── */
/* ▼▼▼ Firebase 콘솔 > 프로젝트설정 > 웹앱 config 을 여기에 붙여넣기 ▼▼▼
   apiKey / messagingSenderId / appId 만 채우면 됨 (나머지는 taskmgr-sync 고정값).
   storageBucket 은 콘솔 값 그대로 (보통 taskmgr-sync.appspot.com 또는 .firebasestorage.app). */
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyCzx9YiZhjEF5RQB3m48zqa8k8eUMTI8b8",
  authDomain: "taskmgr-sync.firebaseapp.com",
  databaseURL: "https://taskmgr-sync-default-rtdb.firebaseio.com",
  projectId: "taskmgr-sync",
  storageBucket: "taskmgr-sync.firebasestorage.app",
};
/* ▲▲▲ config 끝 ▲▲▲ */
/* config 미입력(PASTE_) 상태면 인증 비활성 = 기존 공개모드 그대로 동작(앱 안 깨짐). */
const FB_CONFIGURED = !!FIREBASE_CONFIG.apiKey && !FIREBASE_CONFIG.apiKey.startsWith("PASTE");
if (FB_CONFIGURED && window.firebase && !firebase.apps.length) {
  try { firebase.initializeApp(FIREBASE_CONFIG); } catch (e) { console.error("[Firebase init]", e); }
}
const fbAuth = () => (FB_CONFIGURED && window.firebase && typeof firebase.auth === "function") ? firebase.auth() : null;
const fbUser = () => { try { return fbAuth()?.currentUser || null; } catch { return null; } };

const fbDataUrl = () => "https://taskmgr-sync-default-rtdb.firebaseio.com/" + WS.fbPath + ".json";
/* 로그인 상태면 ID 토큰을 ?auth= 로 붙여 인증 (잠근 DB 통과). 미로그인/미설정이면 빈 문자열=공개모드. */
const authParam = async () => {
  try { const u = fbUser(); if (u) return "?auth=" + await u.getIdToken(); } catch {}
  return "";
};

/* 클라우드 저장: Firebase PUT (1회 요청, 2초 디바운스) */
let _saveTimer = null;
const cloudSave = (data) => {
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(async () => {
    const el = document.getElementById("sync-status");
    if (el) { el.textContent = "☁️ 저장중..."; el.style.color = "#F59E0B"; }
    const q = await authParam();
    fetch(fbDataUrl() + q, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data),
    }).then(r => {
      /* RTDB는 401(권한거부)에도 유효한 JSON 바디를 주므로 r.ok를 반드시 확인 */
      if (!r.ok) throw new Error("HTTP " + r.status);
      return r.json();
    }).then(() => {
      if (el) { el.textContent = "☁️ 동기화됨"; el.style.color = "#10B981"; setTimeout(() => { el.textContent = "☁️"; el.style.color = "#9ca3af"; }, 2000); }
    }).catch(() => {
      if (el) { el.textContent = "☁️ 실패"; el.style.color = "#EF4444"; setTimeout(() => { el.textContent = "☁️"; el.style.color = "#9ca3af"; }, 3000); }
    });
  }, 2000);
};

/* 클라우드 로드: Firebase GET (1회 요청). 실패와 '빈 DB'를 구분해 반환 —
   로드 실패 시 클라우드 저장을 계속 차단해야 stale 로컬이 클라우드를 덮지 않는다. */
const cloudLoad = async () => {
  try {
    const q = await authParam();
    const r = await fetch(fbDataUrl() + q);
    if (!r.ok) return { ok: false, status: r.status };
    return { ok: true, data: await r.json() };
  } catch { return { ok: false }; }
};

/* ─── 파일 업로드 (RTDB /files 에 base64 저장 — 같은 잠금 규칙 적용, 로그인 필요) ───
   메타({id,name,size,...})는 task.attachments/files 상태에, 실제 bytes 는 /files/<id> 별도 경로에.
   /data 자동저장 블롭과 분리되어 있어 매 저장마다 파일이 재전송되지 않는다. */
const RTDB_FILES_URL = "https://taskmgr-sync-default-rtdb.firebaseio.com/files/";
const FILE_MAX_BYTES = 20 * 1024 * 1024; /* base64 +33% 감안, DB 저장 방식의 실용 한도 */
const uploadFile = (file, onProgress) => new Promise((resolve, reject) => {
  const u = fbUser();
  if (!FB_CONFIGURED || !u) { reject(new Error("파일 업로드는 로그인 후 사용 가능합니다")); return; }
  if (file.size > FILE_MAX_BYTES) { reject(new Error("20MB 이하 파일만 업로드할 수 있습니다")); return; }
  const reader = new FileReader();
  reader.onerror = () => reject(new Error("파일 읽기 실패"));
  reader.onload = async () => {
    try {
      const b64 = String(reader.result).split(",")[1] || "";
      const token = await u.getIdToken();
      const fid = gid();
      const meta = { id: fid, name: file.name, mimeType: file.type || "application/octet-stream", size: file.size, uploadedAt: new Date().toISOString(), store: "rtdb" };
      const xhr = new XMLHttpRequest();
      xhr.open("PUT", RTDB_FILES_URL + fid + ".json?auth=" + token);
      xhr.setRequestHeader("Content-Type", "application/json");
      if (onProgress && xhr.upload) xhr.upload.onprogress = (e) => { if (e.lengthComputable) onProgress(Math.round(e.loaded / e.total * 100)); };
      xhr.onload = () => { (xhr.status >= 200 && xhr.status < 300) ? resolve(meta) : reject(new Error("업로드 실패 (HTTP " + xhr.status + ")")); };
      xhr.onerror = () => reject(new Error("업로드 실패 (네트워크)"));
      xhr.send(JSON.stringify({ name: meta.name, mimeType: meta.mimeType, size: meta.size, uploadedAt: meta.uploadedAt, data: b64 }));
    } catch (e) { reject(e); }
  };
  reader.readAsDataURL(file);
});
const deleteStoredFile = async (att) => {
  try {
    const u = fbUser(); if (!u || !att || !att.id) return;
    const token = await u.getIdToken();
    await fetch(RTDB_FILES_URL + att.id + ".json?auth=" + token, { method: "DELETE" });
  } catch {}
};
const downloadAttachment = async (att) => {
  try {
    const u = fbUser(); if (!u) { alert("로그인 후 사용 가능합니다"); return; }
    const token = await u.getIdToken();
    const r = await fetch(RTDB_FILES_URL + att.id + ".json?auth=" + token);
    if (!r.ok) { alert("다운로드 실패 (HTTP " + r.status + ")"); return; }
    const f = await r.json();
    if (!f || !f.data) { alert("파일이 저장소에 없습니다 (삭제되었을 수 있음)"); return; }
    const bin = atob(f.data);
    const bytes = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    const blob = new Blob([bytes], { type: f.mimeType || "application/octet-stream" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url; a.download = f.name || att.name || "file"; a.click();
    setTimeout(() => URL.revokeObjectURL(url), 10000);
  } catch (e) { alert("다운로드 실패: " + ((e && e.message) || e)); }
};
const fmtSize = (b) => b >= 1048576 ? (b/1048576).toFixed(1)+" MB" : b >= 1024 ? Math.round(b/1024)+" KB" : (b||0)+" B";

/* (S3·cleanup 2026-06-16) 회사 캘린더 가져오기(COMPANY_GAS_URL/KEY·companyFetchEvents) 제거 — 인박스 탭과 함께 폐지(inert였음). */

const GCAL_URL = GAS_URL;
/* ─── 캘린더 JSONP 동기화 (add / update / delete) ─── */
const calSync = (action, params) => new Promise((resolve) => {
  const cb = "_gcal_" + gid();
  const timer = setTimeout(() => { delete window[cb]; if (s.parentNode) s.remove(); resolve({ success: false }); }, 12000);
  window[cb] = (r) => { clearTimeout(timer); delete window[cb]; if (s.parentNode) s.remove(); resolve(r || { success: false }); };
  const qs = new URLSearchParams({ ...params, action, callback: cb });
  const s = document.createElement("script");
  s.src = `${GCAL_URL}?${qs}`;
  s.onerror = () => { clearTimeout(timer); delete window[cb]; if (s.parentNode) s.remove(); resolve({ success: false }); };
  document.body.appendChild(s);
});
const calMakeParams = (task, projects) => {
  const date = task.planDate || task.scheduledDate;
  if (!date) return null;
  const proj = projects?.find(p => p.id === task.project);
  const cleanNotes = (task.notes || '').replace(/\[recurring:[^\]]*\]\s*/g, '').trim(); /* 기계용 태그는 캘린더로 안 보냄 */
  const desc = [proj ? `#${proj.name}` : '', cleanNotes].filter(Boolean).join('\n');
  return { title: WS.calPrefix + task.text, date, desc };
};
/* 서브태스크 캘린더 객체 — 제목=서브 task(sub.text) 기준, 메모 맨 앞에 부모 task명(↳ 부모명) */
const subCalObj = (sub, parent) => ({ ...sub, project: parent ? parent.project : sub.project, notes: "↳ " + (parent ? parent.text : "") + (sub.notes ? "\n" + sub.notes : "") });
/* 수동 버튼용: 기존 이벤트 있으면 update, 없으면 add */
const addToCalendar = (task, projects, onResult) => {
  const p = calMakeParams(task, projects);
  if (!p) { onResult(false, "날짜가 없습니다"); return; }
  const act = task.calEventId ? "update" : "add";
  const params = task.calEventId ? { ...p, eventId: task.calEventId } : p;
  calSync(act, params).then(r => onResult(r?.success, r?.success ? "캘린더 반영됨 ✅" : "캘린더 연동 실패", r?.eventId));
};

/* ─── 반복 태스크 ─── */
const DAYS_KO = ["일", "월", "화", "수", "목", "금", "토"];
const getTodayDow = () => new Date().getDay(); /* 0=일 ~ 6=토 */
const getWeekId = () => { const d = new Date(); const jan1 = new Date(d.getFullYear(),0,1); return `${d.getFullYear()}-W${Math.ceil(((d-jan1)/86400000+jan1.getDay()+1)/7)}`; };
const getMonthId = () => { const d = new Date(); return `${d.getFullYear()}-M${d.getMonth()+1}`; };
const generateRecurringTasks = (recurrings, tasks, projects, history) => {
  const dow = getTodayDow();
  const weekId = getWeekId();
  const today = new Date();
  const todayDom = today.getDate();
  const monthId = getMonthId();
  const lastDom = new Date(today.getFullYear(), today.getMonth() + 1, 0).getDate();
  /* 완료(done)되어 tasks[]에서 빠진 인스턴스도 history.orig에 full 스냅샷 보존됨
     → dedup(중복 재생성 방지)·carry-forward(note 상속)에 반드시 포함 (B) */
  const histInstances = [];
  (history || []).forEach(h => (h.items || []).forEach(it => { if (it.orig && it.orig.recurringId) histInstances.push(it.orig); }));
  const allInstances = [...tasks, ...histInstances];
  const newTasks = [];
  recurrings.forEach(r => {
    const type = r.type || "weekly";
    let period;
    if (type === "daily") {
      period = TODAY;
    } else if (type === "weekly") {
      if (r.dow !== dow) return;
      period = weekId;
    } else if (type === "monthly") {
      if (r.lastDay) { if (todayDom !== lastDom) return; }
      else { if (todayDom !== (r.dom || 1)) return; }
      period = monthId;
    } else return;
    /* 이번 기간 인스턴스가 이미 있으면 skip (신규=recurringId+period / 구=notes 태그 호환), 완료분 포함 */
    const legacyTag = `[recurring:${r.id}:${period}]`;
    if (allInstances.some(t => (t.recurringId === r.id && t.recurringPeriod === period) || t.notes?.includes(legacyTag))) return;
    /* carry-forward(B): 같은 루틴의 가장 최근 인스턴스 note 상속 — daily 누적 입력 (완료분 포함) */
    let carried = "";
    if (type === "daily") {
      const prev = allInstances.filter(t => t.recurringId === r.id)
        .sort((a, b) => (b.recurringPeriod || "").localeCompare(a.recurringPeriod || ""))[0];
      if (prev && prev.notes) carried = prev.notes;
    }
    newTasks.push({
      id: gid(), text: r.text, status: "action", project: r.project || "proj_etc",
      scheduledDate: "", scheduledLabel: "", planDate: TODAY,
      createdAt: TODAY, notes: carried, focus: true, subtasks: [], calEventId: "",
      recurringId: r.id, recurringPeriod: period
    });
  });
  return newTasks;
};

/* ─── 워크스페이스 (업무 ⇄ 개인 — 데이터·캘린더 prefix 완전 분리) ─── */
const WORKSPACES = {
  work:     { key: "work",     label: "업무", icon: "📁", storageKey: "task-manager-v1",          fbPath: "data",     calPrefix: "0. 업무 / " },
  personal: { key: "personal", label: "개인", icon: "🏠", storageKey: "task-manager-personal-v1", fbPath: "personal", calPrefix: "1. 개인 / " },
};
let WS = WORKSPACES[(() => { try { return localStorage.getItem("tm-workspace") === "personal" ? "personal" : "work"; } catch { return "work"; } })()];
const PERSONAL_PROJECTS = [
  /* B2(2026-06-23): 루틴 영역 4종 = 각각 별도 프로젝트(kind:routine). 옛 단일 🔁 루틴(p_routine) 폐지 — 드롭다운·회고·일지 영역별. vault 1.Routine/<영역>과 1:1. /sweep은 recurringId로 매핑(앱 그룹핑 무관). */
  { id: "rt_workout", name: "운동", order: 0, kind: "routine" },
  { id: "rt_english", name: "영어", order: 1, kind: "routine" },

/* ─── localStorage (이중 백업, 워크스페이스별 키) ─── */
const loadSaved = () => {
  try {
    const s = localStorage.getItem(WS.storageKey);
    if (s) { const d = JSON.parse(s); if (d && d.tasks) return migrateData(d); }
    /* 메인 키 실패 시 백업에서 복구 */
    const b = localStorage.getItem(WS.storageKey + "-backup");
    if (b) { const d = JSON.parse(b); if (d && d.tasks) { console.warn("[TaskMgr] 백업에서 복구됨"); return migrateData(d); } }
    return null;
  } catch { return null; }
};
/* 마이그레이션: scheduled 상태 제거 + planDate 필드 추가 */
const migrateData = (data) => {
  if (!data || !data.tasks) return data;
  const TASK_MIGRATION = {
    "rag 지표는 fde 통해서 해결해야 함": "someday",
    "독파모 3~4차 300% 전성비 달성 가능할지?": "waiting",
  };
  data.tasks = data.tasks.map(t => {
    if (TASK_MIGRATION[t.text]) t = { ...t, status: TASK_MIGRATION[t.text] };
    /* scheduled 상태 → action 전환, 과거 마감일은 제거 */
    if (t.status === "scheduled") {
      const isPast = t.scheduledDate && new Date(t.scheduledDate + "T00:00:00") < new Date(TODAY + "T00:00:00");
      t = { ...t, status: "action", scheduledDate: isPast ? "" : (t.scheduledDate || ""), scheduledLabel: isPast ? "" : (t.scheduledLabel || "") };
    }
    /* planDate 필드 없으면 추가 (기존 데이터 호환) */
    if (t.planDate === undefined) t = { ...t, planDate: "" };
    if (t.calEventId === undefined) t = { ...t, calEventId: "" };
    if (t.attachments === undefined) t = { ...t, attachments: [] };
    if (t.marks === undefined) t = { ...t, marks: [] };
    if (t.recap === undefined) t = { ...t, recap: "" };
    if (t.subtasks?.length) t = { ...t, subtasks: t.subtasks.map(s => {
      let ns = s.status === "scheduled" ? { ...s, status: "action" } : { ...s };
      if (ns.planDate === undefined) ns = { ...ns, planDate: "" };
      return ns;
    })};
    return t;
  });
  return data;
};
const saveToStorage = (data) => {
  try {
    const prev = localStorage.getItem(WS.storageKey);
    if (prev) localStorage.setItem(WS.storageKey + "-backup", prev); /* 직전 상태를 백업 */
    localStorage.setItem(WS.storageKey, JSON.stringify(data));
  } catch {}
};

const TaskRow = ({ task, onDone, onDel, onFocus, showProj, projects, onEdit, onUpdate, dragHandlers }) => {

    draggable: true,
    onDragStart: (e) => { dh.onDragStart(task.id); e.dataTransfer.effectAllowed = "move"; e.currentTarget.style.opacity = "0.35"; e.currentTarget.style.transform = "scale(0.98)"; },
    onDragEnd: (e) => { e.currentTarget.style.opacity = "1"; e.currentTarget.style.transform = ""; dh.onDragEnd?.(); },
    onDragOver: (e) => { e.preventDefault(); e.dataTransfer.dropEffect = "move"; const rect = e.currentTarget.getBoundingClientRect(); const midY = rect.top + rect.height / 2; clearIndicator(e.currentTarget); e.currentTarget.classList.add(e.clientY < midY ? "drop-indicator-before" : "drop-indicator-after"); e.currentTarget.dataset.dropPos = e.clientY < midY ? "before" : "after"; },
    onDragEnter: (e) => { e.preventDefault(); },
    onDragLeave: (e) => { if (!e.currentTarget.contains(e.relatedTarget)) clearIndicator(e.currentTarget); },
    onDrop: (e) => { e.preventDefault(); const pos = e.currentTarget.dataset.dropPos || "before"; clearIndicator(e.currentTarget); dh.onDrop?.(task.id, pos); },
  } : {};

  return (
    <div {...dragProps}>

            {task.scheduledDate && (() => { const dl = deadlineInfo(task.scheduledDate); return dl ? <span style={S.dlBdg(dl)}>{dl.icon} {dl.label}</span> : null; })()}
            {task.scheduledDate && <span style={{ fontSize: 10, color: "#6B7280" }}>마감 {fd(task.scheduledDate)}</span>}

            {(task.attachments || []).length > 0 && <span style={{ fontSize: 9, color: "#6366F1", fontWeight: 600, background: "#EEF2FF", padding: "1px 4px", borderRadius: 4 }} title="첨부파일">📎{task.attachments.length}</span>}

            {task.notes && <span onClick={(e) => { e.stopPropagation(); setShowNotes(!showNotes); }} style={{ cursor: "pointer", fontSize: 10, color: showNotes ? "#92400E" : "#B45309", background: showNotes ? "#FEF3C7" : "#FFFBEB", border: "1px solid #FDE68A", padding: "1px 5px", borderRadius: 4, userSelect: "none" }}>📝 메모</span>}

          <button style={{ ...S.gh, fontSize: 10 }} onClick={() => { setAddSub(!addSub); if (!addSub) setShowSubs(true); }} title="하위 할일 추가">+sub</button>
          <button style={S.gh} onClick={() => onEdit(task)}>✏️</button>
          <button style={{ ...S.gh, color: "#EF4444" }} onClick={() => onDel(task.id)}>✕</button>
        </div>
      </div>
      {showSubs && subs.length > 0 && (
        <div style={{ marginLeft: 20, borderLeft: "2px solid #e5e7eb", paddingLeft: 4, marginBottom: 4 }}>
          {subs.map(s => (
            <SubRow key={s.id} sub={s}
              onToggleFocus={() => onUpdate && onUpdate({ ...task, subtasks: subs.map(x => x.id === s.id ? { ...x, focus: !x.focus } : x) })}
              onToggleDone={() => onUpdate && onUpdate({ ...task, subtasks: subs.map(x => x.id === s.id ? { ...x, status: x.status === "done" ? "action" : "done" } : x) })}
              onDel={() => onUpdate && onUpdate({ ...task, subtasks: subs.filter(x => x.id !== s.id) })}

              onCal={() => addToCalendar(subCalObj(s, task), projects, (ok, msg, eventId) => { if (ok && eventId && onUpdate) onUpdate({ ...task, subtasks: subs.map(x => x.id === s.id ? { ...x, calEventId: eventId } : x) }); const el = document.getElementById("cal-toast"); if (el) { el.textContent = ok ? "✅ " + msg : "❌ " + msg; el.style.display = "block"; setTimeout(() => el.style.display = "none", 2000); } })}
            />

  );
};

/* ─── 드래그 정렬 훅 ─── */
const useDragReorder = (onReorder) => {
  const dragRef = useRef(null);
  return {
    onDragStart: (id) => { dragRef.current = id; },
    onDragEnter: () => {},
    onDragEnd: () => { dragRef.current = null; },
    onDrop: (targetId, pos) => { if (dragRef.current && dragRef.current !== targetId) { onReorder(dragRef.current, targetId, pos); dragRef.current = null; } },
  };
};

/* ─── 첨부파일 섹션 (EditModal·파일 탭 공용) ─── */
/* deferred 모드(EditModal): Storage 부수효과를 모달의 저장/취소와 일치시킨다 —
   업로드는 즉시 하되 '취소' 시 롤백 삭제, 삭제는 예약만 했다가 '저장' 시 실행. */
const AttachmentSection = ({ attachments, onChange, deferred, onBusy }) => {
  const [uploading, setUploading] = useState(0); /* 0=idle, 1~100=진행% */
  const [err, setErr] = useState("");
  const inRef = useRef();
  const canUpload = FB_CONFIGURED && !!fbUser();
  const list = attachments || [];
  const pick = async (e) => {
    const file = e.target.files?.[0]; e.target.value = "";
    if (!file) return;
    setErr(""); setUploading(1); if (onBusy) onBusy(true);
    try {
      const att = await uploadFile(file, p => setUploading(Math.max(1, p)));
      if (deferred) deferred.uploads.current.push(att);
      onChange([...list, att]);
    } catch (ex) { setErr((ex && ex.message) || String(ex)); }
    setUploading(0); if (onBusy) onBusy(false);
  };
  const remove = (att) => {
    if (deferred) {
      if (!window.confirm('"' + att.name + '" 첨부를 삭제할까요? (저장을 눌러야 확정)')) return;
      deferred.deletes.current.push(att);
      onChange(list.filter(a => a.id !== att.id));
      return;
    }
    if (!window.confirm('"' + att.name + '" 첨부를 삭제할까요? (저장소 파일도 함께 삭제)')) return;
    deleteStoredFile(att);
    onChange(list.filter(a => a.id !== att.id));
  };
  return (
    <div>
      <div style={S.lbl}>📎 첨부파일</div>
      {list.map(a => (
        <div key={a.id} style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12, padding: "3px 0" }}>
          <a href="#" onClick={(e) => { e.preventDefault(); downloadAttachment(a); }} style={{ color: "#3B82F6", flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", cursor: "pointer" }} title="클릭하여 다운로드">📎 {a.name}</a>
          <span style={{ color: "#9ca3af", fontSize: 10, flexShrink: 0 }}>{fmtSize(a.size)}</span>
          <button style={{ ...S.gh, fontSize: 10, color: "#EF4444", flexShrink: 0 }} onClick={() => remove(a)}>✕</button>
        </div>
      ))}
      {canUpload ? (
        <div style={{ marginTop: 4 }}>
          <input ref={inRef} type="file" style={{ display: "none" }} onChange={pick} />
          {uploading > 0
            ? <span style={{ fontSize: 12, color: "#F59E0B" }}>⬆️ 업로드 중… {uploading}%</span>
            : <button style={{ ...S.gh, fontSize: 11 }} onClick={() => inRef.current?.click()}>+ 파일 첨부</button>}
        </div>
      ) : (
        <div style={{ fontSize: 11, color: "#9ca3af", marginTop: 2 }}>파일 업로드는 Firebase 설정(로그인) 후 사용 가능</div>
      )}
      {err && <div style={{ fontSize: 11, color: "#EF4444", marginTop: 2 }}>{err}</div>}
    </div>
  );
};

              {f.scheduledDate && (() => { const dl = deadlineInfo(f.scheduledDate); return dl ? <span style={S.dlBdg(dl)}>{dl.icon} {dl.label}</span> : null; })()}
              {f.scheduledDate && <button style={{ ...S.gh, fontSize: 10, color: "#EF4444" }} onClick={() => { u("scheduledDate", ""); u("scheduledLabel", ""); }}>✕</button>}
            </div>
          </div>
          {/* (2026-06-26) 채널 마커(🧠🎯✍️) 폐지 → 지식·교훈·글감 버킷(프로젝트)으로 대체. 예측 폐지. */}
          {/* (2026-06-18) 첨부 제거 — 파일은 회고에 종속(회고탭 RecapFileBox). task 편집엔 불필요 */}
          <div><div style={S.lbl}>메모 / 맥락</div><textarea style={S.ta} rows={3} value={f.notes || ""} onChange={e => u("notes", e.target.value)} /></div>
          <div><div style={{ ...S.lbl, color: "#7C3AED", fontWeight: 600 }}>🪞 회고 (메모와 별개 — 완료 결과·교훈)</div><textarea style={{ ...S.ta, background: "#FAF5FF" }} rows={3} placeholder="이 task의 회고(근거·결과·다음 액션·교훈 등). 주1 정제가 수거." value={f.recap || ""} onChange={e => u("recap", e.target.value)} /></div>
          <div style={{ display: "flex", justifyContent: "flex-end", gap: 8 }}>
            <button style={S.gh} onClick={cancel}>취소</button>
            <button style={{ ...S.btn(), opacity: attBusy ? 0.4 : 1, cursor: attBusy ? "wait" : "pointer" }} onClick={commit} title={attBusy ? "파일 업로드 완료 후 저장할 수 있습니다" : ""}>저장</button>
          </div>
        </div>
      </div>
    </div>
  );
};

/* ═══ 계획 요약 (planDate 기준 오늘/이번주) ═══ */
const PlanDateSummary = ({ tasks, projects, onEdit }) => {
  const planned = useMemo(() => {
    const items = [];
    tasks.forEach(t => {
      if (t.status !== "done" && t.planDate) items.push(t);
      (t.subtasks || []).forEach(s => { if (s.status !== "done" && s.planDate) items.push({ ...s, project: t.project, _parentId: t.id }); });
    });
    return items;
  }, [tasks]);
  const weekPlan = planned.filter(t => { const d = diffDays(t.planDate); return d !== null && d > 0 && d <= 7; }).sort((a, b) => a.planDate.localeCompare(b.planDate));
  const overduePlan = planned.filter(t => { const d = diffDays(t.planDate); return d !== null && d < 0; }).sort((a, b) => a.planDate.localeCompare(b.planDate));
  const [weekOpen, setWeekOpen] = useState(false);
  if (!weekPlan.length && !overduePlan.length) return null;
  const PlanItem = ({ t }) => {
    const p = projects.find(x => x.id === t.project);
    return (
      <div style={{ display: "flex", alignItems: "center", gap: 6, padding: "3px 0", fontSize: 12 }}>
        <Badge st={t.status} />
        <span style={{ color: "#374151", flex: 1 }}>{t.text}</span>
        {p && <span style={{ fontSize: 10, color: "#9ca3af" }}>#{p.name}</span>}
        {t._parentId && <span style={{ fontSize: 9, color: "#9ca3af" }}>↳</span>}
        <button style={{ ...S.gh, fontSize: 10, padding: "1px 5px" }} onClick={() => onEdit(t, t._parentId)}>✏️</button>
      </div>
    );
  };
  return (
    <div style={{ marginBottom: 12 }}>
      {overduePlan.length > 0 && <div style={{ background: "linear-gradient(135deg, #FEF2F2 0%, #FECACA 100%)", border: "1px solid #FCA5A5", borderRadius: 8, padding: "10px 14px", marginBottom: 8 }}>
        <div style={{ fontSize: 13, fontWeight: 600, color: "#991B1B", marginBottom: 4 }}>📆 지난 계획 미처리 ({overduePlan.length}건)</div>
        {overduePlan.map(t => <div key={t.id} style={{ display: "flex", alignItems: "center", gap: 6, padding: "3px 0", fontSize: 12 }}>
          <span style={{ fontSize: 10, color: "#DC2626", fontWeight: 600 }}>{fd(t.planDate)}</span><PlanItem t={t} />
        </div>)}
      </div>}
      {weekPlan.length > 0 && <div style={{ background: "linear-gradient(135deg, #F5F3FF 0%, #EDE9FE 100%)", border: "1px solid #C4B5FD", borderRadius: 8, padding: "10px 14px", marginBottom: 8 }}>
        <div onClick={() => setWeekOpen(!weekOpen)} style={{ fontSize: 13, fontWeight: 600, color: "#6D28D9", marginBottom: weekOpen ? 4 : 0, cursor: "pointer", userSelect: "none", display: "flex", alignItems: "center", gap: 6 }}><span style={{ fontSize: 11 }}>{weekOpen ? "▼" : "▶"}</span> 📆 이번주 계획 ({weekPlan.length}건)</div>
        {weekOpen && weekPlan.map(t => <div key={t.id} style={{ display: "flex", alignItems: "center", gap: 6, padding: "3px 0", fontSize: 12 }}>
          <span style={{ fontSize: 10, color: "#6D28D9", fontWeight: 600 }}>{fd(t.planDate)}</span><PlanItem t={t} />
        </div>)}
      </div>}
    </div>
  );
};

/* ═══ 마감 알림 (서브태스크 포함) ═══ */
const ScheduleAlerts = ({ tasks, projects, onEdit }) => {
  const allScheduled = useMemo(() => {
    const items = [];
    tasks.forEach(t => {
      if (t.status !== "done" && t.scheduledDate) items.push({ type: "task", data: t, parent: null });
      (t.subtasks || []).forEach(s => {
        if (s.status !== "done" && s.scheduledDate) items.push({ type: "sub", data: s, parent: t });
      });
    });
    return items;
  }, [tasks]);
  const overdue = allScheduled.filter(i => diffDays(i.data.scheduledDate) < 0).sort((a, b) => a.data.scheduledDate.localeCompare(b.data.scheduledDate));
  const soon = allScheduled.filter(i => { const d = diffDays(i.data.scheduledDate); return d >= 0 && d <= 7; }).sort((a, b) => a.data.scheduledDate.localeCompare(b.data.scheduledDate));
  if (!overdue.length && !soon.length) return null;
  const AlertItem = ({ item }) => {
    const p = projects.find(x => x.id === (item.type === "task" ? item.data.project : item.parent.project));
    const dl = deadlineInfo(item.data.scheduledDate);
    return (
      <div style={{ display: "flex", alignItems: "center", gap: 6, padding: "3px 0", fontSize: 12 }}>
        <span style={S.dlBdg(dl)}>{dl.icon} {dl.label}</span>
        {item.type === "sub" && <span style={{ fontSize: 10, color: "#9ca3af" }}>↳</span>}
        <span style={{ color: "#374151", flex: 1 }}>{item.data.text}</span>
        {p && <span style={{ fontSize: 10, color: "#9ca3af" }}>#{p.name}</span>}
        <button style={{ ...S.gh, fontSize: 10, padding: "1px 5px" }} onClick={() => item.type === "task" ? onEdit(item.data) : onEdit(item.data, item.parent.id)}>✏️</button>
      </div>
    );
  };
  return (
    <div style={{ marginBottom: 12 }}>
      {overdue.length > 0 && <div style={S.alertOverdue}><div style={{ fontSize: 13, fontWeight: 600, color: "#991B1B", marginBottom: 6 }}>🔴 마감 초과 ({overdue.length}건)</div>{overdue.map((item, i) => <AlertItem key={i} item={item} />)}</div>}
      {soon.length > 0 && <div style={S.alertSoon}><div style={{ fontSize: 13, fontWeight: 600, color: "#9A3412", marginBottom: 6 }}>🟡 7일 이내 마감 ({soon.length}건)</div>{soon.map((item, i) => <AlertItem key={i} item={item} />)}</div>}
    </div>
  );
};

/* ═══ 오늘 뷰 (서브태스크 집중 포함) ═══ */
const TodayView = ({ tasks, projects, onDone, onDel, onFocus, onAdd, onEdit, onUpdate, onReorder }) => {
  const dragHandlers = useDragReorder(onReorder);
  const { focusedTasks, focusedSubs } = useMemo(() => {
    const pk = (t) => projSortKey(projects.find(p => p.id === t.project)); /* 루틴>프로젝트>버킷>기타 */
    const ft = tasks.filter(t => t.status !== "done" && (t.focus || t.planDate === TODAY)).sort((a, b) => pk(a) - pk(b));
    const fs = [];
    tasks.forEach(t => { (t.subtasks || []).forEach(s => { if (s.status !== "done" && (s.focus || s.planDate === TODAY)) fs.push({ sub: s, parent: t }); }); });
    return { focusedTasks: ft, focusedSubs: fs };
  }, [tasks, projects]);
  const totalFocused = focusedTasks.length + focusedSubs.length;
  const unfocusedActions = tasks.filter(t => t.status === "action" && !t.focus && t.planDate !== TODAY);
  const waitingAll = tasks.filter(t => t.status === "waiting" && !t.focus && t.planDate !== TODAY);
  const later = tasks.filter(t => t.status === "someday" && !t.focus && t.planDate !== TODAY);
  const [showRest, setShowRest] = useState(false);

  /* 집중 그룹: 일반 task + 서브태스크 통합 */
  const focusGroups = useMemo(() => {
    const groups = {};
    SK.forEach(k => { groups[k] = []; });
    focusedTasks.forEach(t => groups[t.status]?.push({ type: "task", data: t }));
    focusedSubs.forEach(({ sub, parent }) => groups[sub.status]?.push({ type: "sub", data: sub, parent }));
    return SK.map(k => ({ k, label: STATUSES[k].label, items: groups[k] })).filter(g => g.items.length > 0);
  }, [focusedTasks, focusedSubs]);

  const toggleSubInParent = (parentId, subId, field) => {
    const parent = tasks.find(t => t.id === parentId);
    if (!parent || !onUpdate) return;
    if (field === "focus") onUpdate({ ...parent, subtasks: (parent.subtasks || []).map(s => s.id === subId ? { ...s, focus: !s.focus } : s) });
    if (field === "done") onUpdate({ ...parent, subtasks: (parent.subtasks || []).map(s => s.id === subId ? { ...s, status: s.status === "done" ? "action" : "done" } : s) });
  };

  const renderItem = (item) => {
    if (item.type === "task") return <TaskRow key={item.data.id} task={item.data} projects={projects} showProj onDone={onDone} onDel={onDel} onFocus={onFocus} onEdit={onEdit} onUpdate={onUpdate} dragHandlers={dragHandlers} />;
    return (
      <div key={item.data.id} style={{ paddingLeft: 8 }}>
        <div style={{ fontSize: 10, color: "#9ca3af", paddingLeft: 30 }}>↳ {item.parent.text}</div>
        <SubRow sub={item.data}
          onToggleFocus={() => toggleSubInParent(item.parent.id, item.data.id, "focus")}
          onToggleDone={() => toggleSubInParent(item.parent.id, item.data.id, "done")}
          onDel={() => onUpdate && onUpdate({ ...item.parent, subtasks: (item.parent.subtasks || []).filter(s => s.id !== item.data.id) })}
          onEdit={() => onEdit(item.data, item.parent.id)}
          onCal={() => addToCalendar(subCalObj(item.data, item.parent), projects, (ok, msg, eventId) => { if (ok && eventId && onUpdate) onUpdate({ ...item.parent, subtasks: (item.parent.subtasks || []).map(s => s.id === item.data.id ? { ...s, calEventId: eventId } : s) }); const el = document.getElementById("cal-toast"); if (el) { el.textContent = ok ? "✅ " + msg : "❌ " + msg; el.style.display = "block"; setTimeout(() => el.style.display = "none", 2000); } })} />
      </div>
    );
  };

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 0" }}>
        <div style={{ fontSize: 13, color: "#6b7280" }}>
          {fd(TODAY)} — 오늘 할 일 <strong style={{ color: "#F59E0B" }}>{totalFocused}</strong>개
          {unfocusedActions.length > 0 && <span> · 다음행동 {unfocusedActions.length}</span>}
          {waitingAll.length > 0 && <span> · 대기중 {waitingAll.length}</span>}
        </div>
      </div>
      <PlanDateSummary tasks={tasks} projects={projects} onEdit={onEdit} />
      <ScheduleAlerts tasks={tasks} projects={projects} onEdit={onEdit} />
      <AddForm projects={projects} onAdd={onAdd} />
      {totalFocused > 0 ? (
        <div style={{ marginTop: 16 }}>
          <div style={S.focusBanner}>
            <div style={{ fontSize: 13, fontWeight: 600, color: "#92400E", marginBottom: 4 }}>⭐ 오늘 할 일 ({totalFocused})</div>
            <div style={{ fontSize: 11, color: "#A16207" }}>⭐ 집중 표시 또는 📆 오늘 계획된 항목</div>
          </div>
          {focusGroups.map(g => (
            <div key={g.k} style={{ marginBottom: 8 }}>
              <div style={{ fontSize: 11, color: "#9ca3af", fontWeight: 500, padding: "2px 10px", marginBottom: 2 }}>{STATUSES[g.k]?.icon} {g.label}</div>
              {g.items.map(renderItem)}
            </div>
          ))}
        </div>
      ) : (
        <div style={{ ...S.emp, marginTop: 16 }}>⭐ 집중 표시를 누르거나 📆 오늘 계획을 설정하세요</div>
      )}
      <div style={{ marginTop: 20 }}>
        <div style={{ ...S.secT, cursor: "pointer", userSelect: "none" }} onClick={() => setShowRest(!showRest)}>
          {showRest ? "▼" : "▶"} 전체 현황
          <span style={S.cnt(unfocusedActions.length + waitingAll.length)}>{unfocusedActions.length + waitingAll.length}</span>
        </div>
        {showRest && (
          <div>
            {unfocusedActions.length > 0 && <div style={S.sec}><div style={{ fontSize: 12, fontWeight: 500, color: "#3B82F6", marginBottom: 6 }}>🔵 다음행동 ({unfocusedActions.length})</div>{unfocusedActions.map(t => <TaskRow key={t.id} task={t} projects={projects} showProj onDone={onDone} onDel={onDel} onFocus={onFocus} onEdit={onEdit} onUpdate={onUpdate} dragHandlers={dragHandlers} />)}</div>}
            {waitingAll.length > 0 && <div style={S.sec}><div style={{ fontSize: 12, fontWeight: 500, color: "#F59E0B", marginBottom: 6 }}>⏳ 대기중 ({waitingAll.length})</div>{waitingAll.map(t => <TaskRow key={t.id} task={t} projects={projects} showProj onDone={onDone} onDel={onDel} onFocus={onFocus} onEdit={onEdit} onUpdate={onUpdate} dragHandlers={dragHandlers} />)}</div>}
            {later.length > 0 && <div style={S.sec}><div style={{ fontSize: 12, fontWeight: 500, color: "#9CA3AF", marginBottom: 6 }}>💤 나중에 ({later.length})</div>{later.map(t => <TaskRow key={t.id} task={t} projects={projects} showProj onDone={onDone} onDel={onDel} onFocus={onFocus} onEdit={onEdit} onUpdate={onUpdate} dragHandlers={dragHandlers} />)}</div>}
          </div>
        )}
      </div>
    </div>
  );
};

/* ═══ 과제별 뷰 ═══ */
const ProjectsView = ({ tasks, projects, issues, onDone, onDel, onFocus, onAdd, onEdit, onAddProj, onEditProj, onDelProj, onUpdate, onReorder, isWork }) => {
  const [open, setOpen] = useState(new Set(projects.filter(p => tasks.some(t => t.project === p.id && t.status !== "done")).map(p => p.id)));
  const [np, setNp] = useState("");
  const [editId, setEditId] = useState(null);
  const [editName, setEditName] = useState("");
  const [addKind, setAddKind] = useState("project");
  const tog = id => setOpen(prev => { const n = new Set(prev); n.has(id) ? n.delete(id) : n.add(id); return n; });
  const dragHandlers = useDragReorder(onReorder);
  const isDefault = (id) => PERSONAL_PROJECTS.some(d => d.id === id);
  const startEdit = (e, p) => { e.stopPropagation(); setEditId(p.id); setEditName(p.name); };
  const saveEdit = () => { if (editName.trim()) onEditProj(editId, editName.trim()); setEditId(null); setEditName(""); };
  const askDel = (e, p) => { e.stopPropagation();
    const cnt = tasks.filter(t => t.project === p.id && t.status !== "done").length;
    if (window.confirm('"' + p.name + '" 과제를 삭제할까요?' + (cnt > 0 ? " (할일 " + cnt + "개도 함께 삭제)" : ""))) onDelProj(p.id);
  };
  const renderProj = (p) => {
    const pt = tasks.filter(t => t.project === p.id && t.status !== "done");
    const pi = issues.filter(i => i.project === p.id && i.status === "open");
    const fc = pt.filter(t => t.focus).length;
    const o = open.has(p.id);
    const canDel = isWork || !isDefault(p.id);
    return (
      <div key={p.id} style={{ marginBottom: 6 }}>
        <div style={S.ph(o)} onClick={() => { if (editId !== p.id) tog(p.id); }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8, flex: 1, minWidth: 0 }}>
            <span style={{ fontSize: 11, color: "#9ca3af" }}>{o ? "▼" : "▶"}</span>
            {editId === p.id
              ? <input autoFocus value={editName} onClick={e => e.stopPropagation()} onChange={e => setEditName(e.target.value)}
                  onKeyDown={e => { if (e.key === "Enter") saveEdit(); if (e.key === "Escape") { setEditId(null); setEditName(""); } }}
                  onBlur={saveEdit} style={{ ...S.inp, fontSize: 14, padding: "2px 6px", maxWidth: 200 }} />
              : <span style={{ fontWeight: 600, fontSize: 14 }}>{p.name}</span>}
            <span style={S.cnt(pt.length)}>{pt.length}</span>
            {fc > 0 && <span style={{ fontSize: 11, color: "#F59E0B" }}>⭐{fc}</span>}
            {pi.length > 0 && <span style={{ fontSize: 11, color: "#EF4444" }}>💬 {pi.length}</span>}
          </div>
          {editId !== p.id && <div style={{ display: "flex", gap: 2, flexShrink: 0 }}>
            <button style={{ ...S.gh, fontSize: 10, padding: "1px 5px" }} onClick={e => startEdit(e, p)} title="이름 수정">✏️</button>
            {canDel && <button style={{ ...S.gh, fontSize: 10, padding: "1px 5px", color: "#EF4444" }} onClick={e => askDel(e, p)} title="과제 삭제">🗑</button>}
          </div>}
        </div>
        {o && <div style={{ paddingLeft: 8, marginBottom: 12 }}>
          {SK.map(s => { const items = pt.filter(t => t.status === s); if (!items.length) return null;
            return <div key={s} style={{ marginBottom: 4 }}>{items.map(t => <TaskRow key={t.id} task={t} projects={projects} onDone={onDone} onDel={onDel} onFocus={onFocus} onEdit={onEdit} onUpdate={onUpdate} dragHandlers={dragHandlers} />)}</div>; })}
          {pt.length === 0 && <div style={{ ...S.emp, padding: 16 }}>할 일 없음</div>}
          <div style={S.div} /><AddForm projects={projects} onAdd={onAdd} defProj={p.id} />
        </div>}
      </div>
    );
  };
  const mainProjs = projects.filter(p => !isBucketProj(p));
  const bucketProjs = projects.filter(p => isBucketProj(p));
  return (
    <div style={{ marginTop: 12 }}>
      {!isWork && bucketProjs.length > 0 && <div style={{ fontSize: 11, fontWeight: 700, color: "#6366F1", margin: "2px 0 6px" }}>📂 프로젝트</div>}
      {mainProjs.map(renderProj)}
      {!isWork && bucketProjs.length > 0 && <>
        <div style={{ fontSize: 11, fontWeight: 700, color: "#9ca3af", margin: "14px 0 6px" }}>🗂 그 외 (약속·집안일·기타)</div>
        {bucketProjs.map(renderProj)}
      </>}
      <div style={{ display: "flex", gap: 6, alignItems: "center", marginTop: 16, padding: "8px 0", flexWrap: "wrap" }}>
        {!isWork && <div style={{ display: "flex", gap: 3 }}>
          {[["project", "📂 프로젝트"], ["bucket", "🗂 그 외"]].map(([k, lbl]) => (
            <button key={k} onClick={() => setAddKind(k)} style={{ ...S.gh, fontSize: 11, background: addKind === k ? "#EEF2FF" : "#fff", color: addKind === k ? "#4338CA" : "#9ca3af", borderColor: addKind === k ? "#A5B4FC" : "#e5e7eb", fontWeight: addKind === k ? 700 : 400 }}>{lbl}</button>
          ))}
        </div>}
        <input style={{ ...S.inp, maxWidth: 200 }} placeholder={isWork ? "새 과제 추가..." : (addKind === "bucket" ? "새 '그 외' 항목 (예: 여행)..." : "새 프로젝트 추가...")} value={np} onChange={e => setNp(e.target.value)}
          onKeyDown={e => { if (e.key === "Enter" && np.trim()) { onAddProj(np.trim(), isWork ? "project" : addKind); setNp(""); }}} />
        <button style={S.gh} onClick={() => { if (np.trim()) { onAddProj(np.trim(), isWork ? "project" : addKind); setNp(""); }}}>+ 추가</button>
      </div>
    </div>
  );
};

/* ═══ 메모 뷰 (과제별 메모 CRUD) ═══ */
const MemosView = ({ projects, memos, setMemos }) => {
  const [openP, setOpenP] = useState(new Set(projects.filter(p => (memos[p.id] || []).length > 0).map(p => p.id)));
  const [editId, setEditId] = useState(null);
  const [editText, setEditText] = useState("");
  const [addFor, setAddFor] = useState(null);
  const [newText, setNewText] = useState("");
  const tog = id => setOpenP(prev => { const n = new Set(prev); n.has(id) ? n.delete(id) : n.add(id); return n; });

  const addMemo = (projId) => {
    if (!newText.trim()) return;
    const now = new Date().toISOString();
    setMemos(prev => ({ ...prev, [projId]: [...(prev[projId] || []), { id: gid(), text: newText.trim(), createdAt: now, updatedAt: now }] }));
    setNewText(""); setAddFor(null);
  };
  const updateMemo = (projId, memoId) => {
    if (!editText.trim()) return;
    const now = new Date().toISOString();
    setMemos(prev => ({ ...prev, [projId]: (prev[projId] || []).map(m => m.id === memoId ? { ...m, text: editText.trim(), updatedAt: now } : m) }));
    setEditId(null); setEditText("");
  };
  const deleteMemo = (projId, memoId) => {
    setMemos(prev => ({ ...prev, [projId]: (prev[projId] || []).filter(m => m.id !== memoId) }));
  };

  return (
    <div style={{ marginTop: 12 }}>
      {projects.map(p => {
        const pm = memos[p.id] || [];
        const o = openP.has(p.id);
